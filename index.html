<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Princess! 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="screen active" id="stage1">
        <div class="gift-container" onclick="openGift()">
            <div class="gift-box">🎁</div>
            <h2 class="tap-text">Tap the Magic Gift! ✨</h2>
        </div>
    </div>

    <div class="screen" id="stage2">
        <h1 class="birthday-title">🎉 Happy Birthday Princess! 🎉</h1>
        
        <div class="cake-container">
            <div class="candles-row">
                <div class="candle" onclick="blowCandle(this)"><div class="flame"></div></div>
                <div class="candle" onclick="blowCandle(this)"><div class="flame"></div></div>
                <div class="candle" onclick="blowCandle(this)"><div class="flame"></div></div>
                <div class="candle" onclick="blowCandle(this)"><div class="flame"></div></div>
            </div>
            <div class="cake-tier tier-top"></div>
            <div class="cake-tier tier-bottom"></div>
        </div>
        
        <p class="instruction-text">Touch the candles to blow them out! 🎂</p>
    </div>

    <div class="screen" id="stage3">
        <div class="game-header">
            <h2>🎈 Pop the Balloons! 🎈</h2>
            <p>Score: <span id="score">0</span></p>
        </div>
        
        <div class="baby-frame-container">
            <img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?w=400" alt="Birthday Girl" class="baby-photo" id="babyPhoto">
        </div>

        <div id="balloon-container"></div>
    </div>

    <audio id="magicSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" preload="auto"></audio>
    <audio id="popSound" src="https://assets.mixkit.co/active_storage/sfx/2573/2573-84.wav" preload="auto"></audio>
    <audio id="birthdayMusic" src="https://actions.google.com/sounds/v1/celebrations/birthday_horn.ogg" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
